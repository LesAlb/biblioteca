name: SonarCloud - prestamos-service

on:
  push:
    paths:
      - 'prestamos-service/**'
  pull_request:
    paths:
      - 'prestamos-service/**'

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('prestamos-service/pom.xml') }}

      - name: Build, test y análisis SonarCloud
        working-directory: ./prestamos-service
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=TU_USUARIO_prestamos-service
          -Dsonar.organization=TU_ORGANIZACION
          -Dsonar.host.url=https://sonarcloud.io
